# Configuration for XIAO nRF52840 Sense variant
# This file should be used together with seeed_xiao_nrf52840_sense.overlay

# Enable regulator subsystem for LSM6DS3TR-C and microphone power control.
CONFIG_REGULATOR=y

# Enable the onboard PDM microphone.
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=y
